name: Deploy MoodSpace Frontend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 确保进入前端项目目录
            cd /opt/MoodSpace-Frontend
            # 拉取最新代码
            git pull origin main
            # 安装依赖
            npm install
            # 执行构建 (生成 dist 文件夹)
            npm run build
            # Nginx 会自动根据配置托管 dist 目录，无需重启服务
